name: frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            contract/package-lock.json
            frontend/package-lock.json

      - name: Install contract dependencies
        working-directory: contract
        run: npm ci

      - name: Build and test contract
        working-directory: contract
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate API types
        working-directory: frontend
        run: npm run gen:api

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Prettier check
        run: ./frontend/node_modules/.bin/prettier --check .
