version: '2'

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    gosec:
      excludes:
        # G115: int -> int32 conversions for DurationMinutes are safe — values
        # are bounded by the contract (positive minutes, well below int32 max).
        - G115
    revive:
      rules:
        - name: var-naming
          arguments:
            - - ID
              - URL
              - HTTP
              - JSON
              - API
              - UUID
              - HTML
              - IANA
        - name: indent-error-flow
        - name: errorf
        - name: range
        - name: superfluous-else
        - name: unreachable-code
        - name: var-declaration
        - name: redefines-builtin-id
  exclusions:
    paths:
      - internal/api
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
